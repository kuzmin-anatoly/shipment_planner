services:
  api:
    build: .
    container_name: ai-platform-api
    env_file:
      - .env
    environment:
      LLM_PROVIDER: openai-compatible
      LLM_BASE_URL: http://litellm:4000/v1
      LLM_MODEL: local-llama
      DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - litellm

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-platform-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev}
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ai-platform-ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-platform-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/001_init_pgvector.sql:ro

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    ports:
      - "6379:6379"

volumes:
  ollama:
  postgres:
